<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人工智能训练师（三级）刷题</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --correct: #16a34a;
    --correct-bg: #dcfce7;
    --wrong: #dc2626;
    --wrong-bg: #fee2e2;
    --tag-single: #2563eb;
    --tag-judge: #7c3aed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 22px;
    margin: 0 0 4px;
  }
  header .sub {
    color: var(--muted);
    font-size: 14px;
  }

  /* progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .progress-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0%;
    transition: width .25s ease;
  }
  .progress-score {
    color: var(--muted);
    white-space: nowrap;
  }

  /* card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .q-tag {
    display: inline-block;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 999px;
    color: #fff;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .q-tag.single { background: var(--tag-single); }
  .q-tag.judge  { background: var(--tag-judge); }
  .q-stem {
    font-size: 17px;
    margin: 0 0 20px;
    white-space: pre-wrap;
  }

  /* options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s ease;
    background: #fff;
  }
  .option:hover:not(.disabled) {
    border-color: var(--primary);
    background: #eff6ff;
  }
  .option.disabled { cursor: default; }
  .option.selected { border-color: var(--primary); background: #eff6ff; }
  .option.correct  { border-color: var(--correct); background: var(--correct-bg); }
  .option.wrong    { border-color: var(--wrong);   background: var(--wrong-bg); }
  .opt-key {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #f3f4f6;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .option.selected .opt-key { background: var(--primary); color: #fff; }
  .option.correct  .opt-key { background: var(--correct); color: #fff; }
  .option.wrong    .opt-key { background: var(--wrong);   color: #fff; }
  .opt-text { flex: 1; font-size: 15px; }

  /* buttons */
  .actions {
    margin-top: 22px;
    display: flex;
    gap: 12px;
  }
  button.btn {
    flex: 1;
    padding: 12px 18px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s ease;
    font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
  .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }
  .btn-secondary {
    background: #fff; color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { background: #f9fafb; }

  /* feedback */
  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 15px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok   { background: var(--correct-bg); color: #166534; }
  .feedback.bad  { background: var(--wrong-bg);   color: #991b1b; }
  .feedback .label { font-weight: 700; font-size: 16px; display:block; margin-bottom:4px;}
  .feedback .correct-line { margin-top: 6px; }
  .feedback .expl {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(0,0,0,.12);
    white-space: pre-wrap;
  }
  .feedback .expl b { color: inherit; }

  /* start / results screens */
  .center-card { text-align: center; padding: 36px 24px; }
  .center-card h2 { margin: 0 0 8px; font-size: 22px; }
  .center-card p { color: var(--muted); margin: 4px 0 24px; }
  .mode-pick {
    display: flex; flex-direction: column; gap: 10px;
    text-align: left; margin: 0 auto 24px; max-width: 320px;
  }
  .mode-opt {
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: all .15s ease;
  }
  .mode-opt:hover { border-color: var(--primary); background: #eff6ff; }
  .mode-opt.active { border-color: var(--primary); background: #eff6ff; }
  .mode-opt .cnt { color: var(--muted); font-size: 14px; }
  .start-btn { max-width: 320px; margin: 0 auto; width: 100%; }

  /* results grid */
  .result-big {
    font-size: 48px; font-weight: 800;
    margin: 8px 0;
  }
  .result-big.ok { color: var(--correct); }
  .result-big.mid { color: var(--primary); }
  .result-big.low { color: var(--wrong); }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .stat {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .review-btns { display:flex; gap:12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>人工智能训练师（三级）刷题</h1>
    <div class="sub" id="header-sub"></div>
  </header>

  <!-- START SCREEN -->
  <div id="start-screen" class="card center-card">
    <h2>开始刷题</h2>
    <p>选择题型，逐题作答，提交后立即验证答案</p>
    <div class="mode-pick" id="mode-pick"></div>
    <button class="btn btn-primary start-btn" onclick="startQuiz()">开始</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" style="display:none">
    <div class="progress-row">
      <span id="q-index" class="progress-score"></span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="q-score" class="progress-score"></span>
    </div>
    <div class="card">
      <span class="q-tag" id="q-tag"></span>
      <div class="q-stem" id="q-stem"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()" disabled>提交</button>
        <button class="btn btn-secondary" id="next-btn" style="display:none" onclick="nextQuestion()">下一题</button>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="result-screen" style="display:none">
    <div class="card center-card">
      <h2>练习完成</h2>
      <div class="result-big" id="result-rate">0%</div>
      <div class="sub" id="result-rate-label">正确率</div>
      <div class="stat-grid">
        <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">总题数</div></div>
        <div class="stat"><div class="num" id="stat-correct" style="color:var(--correct)">0</div><div class="lbl">答对</div></div>
        <div class="stat"><div class="num" id="stat-wrong" style="color:var(--wrong)">0</div><div class="lbl">答错</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="num" id="stat-single-rate">—</div><div class="lbl">单选题正确率</div></div>
        <div class="stat"><div class="num" id="stat-judge-rate">—</div><div class="lbl">判断题正确率</div></div>
        <div class="stat"><div class="num" id="stat-skipped">0</div><div class="lbl">未作答</div></div>
      </div>
      <div class="review-btns">
        <button class="btn btn-primary" onclick="reviewWrong()">查看错题</button>
        <button class="btn btn-secondary" onclick="restart()">重新开始</button>
      </div>
    </div>
  </div>

  <!-- WRONG REVIEW SCREEN -->
  <div id="wrong-screen" style="display:none">
    <div class="progress-row">
      <span class="progress-score" id="wrong-index"></span>
      <div class="progress-track"><div class="progress-fill" id="wrong-fill"></div></div>
      <span class="progress-score" id="wrong-count"></span>
    </div>
    <div class="card">
      <span class="q-tag" id="wrong-tag"></span>
      <div class="q-stem" id="wrong-stem"></div>
      <div class="options" id="wrong-options"></div>
      <div class="feedback ok show" id="wrong-feedback" style="margin-top:18px"></div>
      <div class="actions">
        <button class="btn btn-secondary" id="wrong-prev" onclick="wrongNav(-1)">上一题</button>
        <button class="btn btn-primary" id="wrong-next" onclick="wrongNav(1)">下一题</button>
      </div>
      <div style="text-align:center; margin-top:14px">
        <button class="btn btn-secondary" style="max-width:200px;margin:0 auto" onclick="showResults()">返回结果</button>
      </div>
    </div>
  </div>
</div>

<script>

图像识别、个性化推荐等多个方面。"}, {"id": 267, "type": "judge", "stem": "267. 一个高效的人机交互系统应该能够在短时间内响应用户的操作。", "answer": "T", "explanation": "高效的人机交互系统需要快速响应，通常应在几秒内完成操作反馈，以提升用户体验。"}, {"id": 268, "type": "judge", "stem": "268. 用户中心的设计原则要求设计师在设计过程中始终站在用户的角度思考问题， 因此设计师不需要了解产品的目标市场和竞争对手。", "answer": "F", "explanation": "设计师需要了解产品的目标市场和竞争对手，这样才能更好地站在用户角度思考问题，设计出符合用户需求和市场竞争力的产品。"}, {"id": 269, "type": "judge", "stem": "269. 设计的可用性标准是指在设计过程中需要遵循的一系列原则和规范， 以确保产品的易用性和用户体验。", "answer": "T", "explanation": "设计的可用性标准确实是指在设计过程中需要遵循的一系列原则和规范，目的是确保产品的易用性和用户体验。"}, {"id": 270, "type": "judge", "stem": "270. 交互设计模板可以帮助设计师更好地组织和展示他们的想法。", "answer": "T", "explanation": "交互设计模板提供结构化框架，有助于系统化梳理设计思路并提升方案呈现的清晰度。"}, {"id": 271, "type": "judge", "stem": "271. 在设计过程中，用户反馈是必不可少的环节， 因为它可以帮助设计师更好地了解用户需求。", "answer": "T", "explanation": "用户反馈是设计过程中的重要环节，能帮助设计师更准确地理解用户需求，优化设计方案。"}, {"id": 272, "type": "judge", "stem": "272. 工作流程的任务分解有助于明确每个阶段的责任和目标。", "answer": "T", "explanation": "工作流程的任务分解可以将复杂的工作拆分为更小、更易管理的部分，从而明确每个阶段的具体责任和预期目标，提高工作效率和可执行性。"}, {"id": 273, "type": "judge", "stem": "273. 界面设计的布局策略仅关注美观而忽视功能性。", "answer": "F", "explanation": "界面设计的布局策略需要兼顾美观和功能性，两者缺一不可。"}, {"id": 274, "type": "judge", "stem": "274. 用户使用情境的分析工具可以帮助设计师更好地理解目标用户的需求和行为。", "answer": "T", "explanation": "用户使用情境分析工具能够帮助设计师深入了解用户的实际需求和行为模式，从而设计出更符合用户期望的产品。"}, {"id": 275, "type": "judge", "stem": "275. 使用 Adobe XD 进行原型制作时，用户可以直接导出最终的设计文件。", "answer": "T", "explanation": "使用 Adobe XD 进行原型制作时，用户可以直接导出最终的设计文件"}, {"id": 276, "type": "judge", "stem": "276. Adobe XD 只能用于创建移动应用的原型。", "answer": "F", "explanation": "Adobe XD 不仅可以用于移动应用原型设计，还支持网页、桌面应用等多种数字产品的原型和设计。"}, {"id": 277, "type": "judge", "stem": "277. Axure RP 是一款用于创建原型和模拟复杂交互的工具。", "answer": "T", "explanation": "Axure RP 是一款专业的原型设计工具，广泛用于创建高保真原型和模拟复杂交互。"}, {"id": 278, "type": "judge", "stem": "278. Axure RP 中的条件逻辑设置可以用来控制页面元素的显示和隐藏。", "answer": "T", "explanation": "Axure RP 中的条件逻辑设置确实可以用来控制页面元素的显示和隐藏，通过交互事件和条件判断实现动态效果。"}, {"id": 279, "type": "judge", "stem": "279. Balsamiq Mock ups 只能用于创建线框图。", "answer": "F", "explanation": "Balsamiq Mockups 不仅可以创建线框图，还支持添加交互元素和简单原型功能，虽然主要专注于快速草图风格设计，但功能不限于静态线框。"}, {"id": 280, "type": "judge", "stem": "280. Figma 的设计系统支持创建自定义组件库。", "answer": "T", "explanation": "Figma 的设计系统功能允许用户创建、管理和共享自定义组件库，支持团队协作和设计一致性。"}, {"id": 281, "type": "judge", "stem": "281. Marvel 的简单交互设计强调减少用户的认知负担，提高用户体验。", "answer": "T", "explanation": "Marvel 的交互设计理念确实注重简化用户操作流程，降低学习成本，从而提升整体用户体验。"}, {"id": 282, "type": "judge", "stem": "282. 在使用 Marvel 的设计评审功能时，用户可以上传自己的设计文件，但是不能邀请其他团队成员进行评论。", "answer": "F", "explanation": "Marvel 的设计评审功能允许用户上传设计文件并邀请团队成员进行评论和协作。"}, {"id": 283, "type": "judge", "stem": "283. 使用 Marvel 的响应式设计预览，设计师可以轻松地查看和调整他们的网站布局，以确保其在各种设备上都能正常工作。", "answer": "T", "explanation": "Marvel 的设计工具支持响应式设计预览，允许设计师在不同设备上查看和调整布局。"}, {"id": 284, "type": "judge", "stem": "284. Sketch 的插件生态系统为用户提供了广泛的功能扩展选项。", "answer": "T", "explanation": "Sketch 的插件生态系统确实提供了丰富的功能扩展选项，用户可以通过安装插件来增强软件的功能和效率。"}, {"id": 285, "type": "judge", "stem": "285. Sketch 的矢量图形编辑功能非常强大，可以轻松地创建和编辑各种复杂的图形。", "answer": "T", "explanation": "Sketch 是一款专业的矢量图形设计工具，提供丰富的编辑功能，适合创建和修改复杂图形。"}, {"id": 286, "type": "judge", "stem": "286. 培训讲义编写应该包含大量的理论知识和实例分析。", "answer": "T", "explanation": "培训讲义编写应兼顾理论知识和实例分析，理论提供框架，实例帮助理解应用。"}, {"id": 287, "type": "judge", "stem": "287. 培训讲义的编写应该遵循一定的结构，包括引入 、主体和总结三个部分。", "answer": "T", "explanation": "培训讲义的编写通常需要包括引入、主体和总结三个部分，以确保内容的完整性和逻辑性。"}, {"id": 288, "type": "judge", "stem": "288. 编写培训讲义时，不需要考虑学员的学习需求和背景。", "answer": "F", "explanation": "编写培训讲义时必须考虑学员的学习需求和背景，这是确保培训效果的关键因素。"}, {"id": 289, "type": "judge", "stem": "289. 在人工智能培训中，使用单一的教学方法可以有效地满足所有学员的学习需求。", "answer": "F", "explanation": "单一教学方法无法满足不同学员的多样化学习需求，因为学员的学习风格、基础水平和理解能力存在差异。"}, {"id": 290, "type": "judge", "stem": "290. 讲授法是一种单向沟通的培训方法， 因此它不利于受训者主动参与培训。", "answer": "F", "explanation": "讲授法虽然是单向沟通，但通过提问、讨论等互动方式可以促进受训者主动参与。"}, {"id": 291, "type": "judge", "stem": "291. 讲授法是一种非常有效的培训方法， 因此没有缺点。", "answer": "F", "explanation": "讲授法虽然高效，但存在单向传递、缺乏互动、难以因材施教等缺点。"}, {"id": 292, "type": "judge", "stem": "292. 培训方法的选择应该完全依赖于培训者的经验和偏好。", "answer": "F", "explanation": "培训方法的选择应基于培训目标、学员需求、学习内容和资源条件等多方面因素，而非仅依赖培训者的经验和偏好。"}, {"id": 293, "type": "judge", "stem": "293. 在数据采集和处理流程中，重点分析数据的质量和准确性是非常重要的。", "answer": "T", "explanation": "在数据采集和处理流程中，分析数据的质量和准确性是确保后续分析和决策可靠性的关键步骤。"}, {"id": 294, "type": "judge", "stem": "294. 在数据采集和处理流程中，数据清洗的主要目的是去除重复数据和提高数据质量。", "answer": "T", "explanation": "数据清洗的主要目的是去除重复数据、纠正错误、填补缺失值等，从而提高数据质量。"}, {"id": 295, "type": "judge", "stem": "295. 在数据采集和处理流程中，数据清洗是一个不必要的步骤。", "answer": "F", "explanation": "数据清洗是数据采集和处理流程中非常重要的步骤，它可以帮助去除无效、错误或不一致的数据，提高数据质量和后续分析的准确性。"}, {"id": 296, "type": "judge", "stem": "296. 指导数据采集和处理问题的解决方法主要包括数据清洗、数据转换和数据可视化。", "answer": "T", "explanation": "数据清洗、数据转换和数据可视化是指导数据采集和处理问题的常见方法。"}, {"id": 297, "type": "judge", "stem": "297. 在数据标注流程中，标注员需要严格按照标注规则进行操作。", "answer": "T", "explanation": "标注员需遵循标注规则以确保数据标注的一致性和准确性。"}, {"id": 298, "type": "judge", "stem": "298. 数据标注流程中的难点仅仅是数据清洗。", "answer": "F", "explanation": "数据标注流程中的难点不仅包括数据清洗，还涉及标注标准制定、标注人员培训、标注质量控制和标注效率提升等多个环节。"}, {"id": 299, "type": "judge", "stem": "299. 数据标注流程中的常见问题点包括数据清洗和预处理。", "answer": "T", "explanation": "数据清洗和预处理是数据标注流程中的关键环节，常见问题包括数据质量不一致、缺失值处理、噪声数据过滤等，直接影响标注结果的准确性。"}, {"id": 300, "type": "judge", "stem": "300. 在数据标注过程中，标注人员需要遵循一定的标注规范和流程。", "answer": "T", "explanation": "标注人员需要遵循标注规范和流程以确保数据质量和一致性。"}], "multi": []};
const MODES = [
  { key: "all",    label: "全部题目", get: () => QUESTIONS.single.map(q=>({...q,cat:"单选题"})).concat(QUESTIONS.judge.map(q=>({...q,cat:"判断题"}))) },
  { key: "single", label: "仅单选题", get: () => QUESTIONS.single.map(q=>({...q,cat:"单选题"})) },
  { key: "judge",  label: "仅判断题", get: () => QUESTIONS.judge.map(q=>({...q,cat:"判断题"})) }
];

// precompute counts
const COUNTS = {
  all: QUESTIONS.single.length + QUESTIONS.judge.length,
  single: QUESTIONS.single.length,
  judge: QUESTIONS.judge.length
};

let selectedMode = "all";
let queue = [];          // current question list
let curIdx = 0;          // index into queue
let selectedKey = null;  // current selection
let submitted = false;
let results = [];        // {q, correct, picked} per queue item

// ---------- START SCREEN ----------
function renderStart() {
  document.getElementById("header-sub").textContent =
    "共 " + COUNTS.all + " 道题（单选 " + COUNTS.single + " · 判断 " + COUNTS.judge + "）";
  const pick = document.getElementById("mode-pick");
  pick.innerHTML = "";
  MODES.forEach(m => {
    const div = document.createElement("div");
    div.className = "mode-opt" + (m.key === selectedMode ? " active" : "");
    div.dataset.key = m.key;
    div.innerHTML = `<span>${m.label}</span><span class="cnt">${COUNTS[m.key]} 道</span>`;
    div.onclick = () => { selectedMode = m.key; renderStart(); };
    pick.appendChild(div);
  });
}

function startQuiz() {
  const mode = MODES.find(m => m.key === selectedMode);
  queue = mode.get();
  curIdx = 0;
  results = new Array(queue.length).fill(null);
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "block";
  renderQuestion();
}

// ---------- QUIZ SCREEN ----------
function renderQuestion() {
  const q = queue[curIdx];
  selectedKey = null;
  submitted = false;

  // progress
  document.getElementById("q-index").textContent = (curIdx + 1) + " / " + queue.length;
  document.getElementById("progress-fill").style.width =
    ((curIdx) / queue.length * 100) + "%";
  const done = results.filter(Boolean).length;
  const right = results.filter(r => r && r.correct).length;
  document.getElementById("q-score").textContent = "已对 " + right + "/" + done;

  // tag + stem
  const tag = document.getElementById("q-tag");
  if (q.type === "single") { tag.className = "q-tag single"; tag.textContent = q.cat; }
  else { tag.className = "q-tag judge"; tag.textContent = q.cat; }
  document.getElementById("q-stem").textContent = q.stem;

  // options
  const optBox = document.getElementById("options");
  optBox.innerHTML = "";
  let entries;
  if (q.type === "single") {
    entries = ["A","B","C","D"].map(k => [k, q.options[k] || ""]);
  } else {
    entries = [["T","正确"],["F","错误"]];
  }
  entries.forEach(([k, text]) => {
    const div = document.createElement("div");
    div.className = "option";
    div.dataset.key = k;
    div.innerHTML = `<span class="opt-key">${q.type==="single"?k:(k==="T"?"√":"×")}</span><span class="opt-text"></span>`;
    div.querySelector(".opt-text").textContent = text;
    div.onclick = () => pickOption(k, div);
    optBox.appendChild(div);
  });

  // reset actions & feedback
  document.getElementById("feedback").className = "feedback";
  document.getElementById("submit-btn").style.display = "";
  document.getElementById("submit-btn").disabled = true;
  document.getElementById("next-btn").style.display = "none";
}

function pickOption(k, el) {
  if (submitted) return;
  selectedKey = k;
  document.querySelectorAll("#options .option").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("submit-btn").disabled = false;
}

function submitAnswer() {
  if (submitted || selectedKey == null) return;
  submitted = true;
  const q = queue[curIdx];
  const isCorrect = selectedKey === q.answer;
  results[curIdx] = { q, correct: isCorrect, picked: selectedKey };

  // lock options
  const opts = document.querySelectorAll("#options .option");
  opts.forEach(o => {
    o.classList.add("disabled");
    o.classList.remove("selected");
    const k = o.dataset.key;
    if (k === q.answer) o.classList.add("correct");
    if (k === selectedKey && !isCorrect) o.classList.add("wrong");
  });

  // feedback
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (isCorrect ? "ok" : "bad");
  let html = `<span class="label">${isCorrect ? "✓ 回答正确" : "✗ 回答错误"}</span>`;
  if (!isCorrect) {
    let ansText;
    if (q.type === "single") ansText = q.answer + "：" + (q.options[q.answer] || "");
    else ansText = q.answer === "T" ? "正确" : "错误";
    html += `<div class="correct-line">正确答案：<b>${ansText}</b></div>`;
  }
  if (q.explanation) {
    html += `<div class="expl"><b>解析：</b>${q.explanation}</div>`;
  }
  fb.innerHTML = html;

  // toggle buttons
  document.getElementById("submit-btn").style.display = "none";
  const nb = document.getElementById("next-btn");
  nb.style.display = "";
  nb.textContent = (curIdx === queue.length - 1) ? "查看结果" : "下一题";

  // refresh live score
  const right = results.filter(r => r && r.correct).length;
  const done = results.filter(Boolean).length;
  document.getElementById("q-score").textContent = "已对 " + right + "/" + done;
}

function nextQuestion() {
  if (curIdx < queue.length - 1) {
    curIdx++;
    renderQuestion();
  } else {
    showResults();
  }
}

// ---------- RESULTS SCREEN ----------
function showResults() {
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("wrong-screen").style.display = "none";
  document.getElementById("result-screen").style.display = "";
  document.getElementById("header-sub").textContent = "";

  const total = queue.length;
  const answered = results.filter(Boolean);
  const correct = answered.filter(r => r.correct).length;
  const wrong = answered.filter(r => !r.correct).length;
  const skipped = total - answered.length;
  const rate = answered.length ? Math.round(correct / answered.length * 100) : 0;

  const rateEl = document.getElementById("result-rate");
  rateEl.textContent = rate + "%";
  rateEl.className = "result-big " + (rate >= 80 ? "ok" : rate >= 60 ? "mid" : "low");

  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-correct").textContent = correct;
  document.getElementById("stat-wrong").textContent = wrong;
  document.getElementById("stat-skipped").textContent = skipped;

  // per-type rate
  function typeRate(type) {
    const t = answered.filter(r => r.q.type === type);
    if (!t.length) return "—";
    const c = t.filter(r => r.correct).length;
    return Math.round(c / t.length * 100) + "%";
  }
  document.getElementById("stat-single-rate").textContent = typeRate("single");
  document.getElementById("stat-judge-rate").textContent = typeRate("judge");

  // hide review-wrong button if no wrong
  document.querySelector('button.btn-primary[onclick="reviewWrong()"]').style.display =
    wrong ? "" : "none";
}

// ---------- WRONG REVIEW ----------
let wrongList = [];
let wrongIdx = 0;
function reviewWrong() {
  wrongList = results.filter(r => r && !r.correct);
  if (!wrongList.length) { showResults(); return; }
  wrongIdx = 0;
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("wrong-screen").style.display = "";
  renderWrong();
}
function renderWrong() {
  const { q, picked } = wrongList[wrongIdx];
  document.getElementById("wrong-index").textContent = (wrongIdx + 1) + " / " + wrongList.length;
  document.getElementById("wrong-fill").style.width = ((wrongIdx+1)/wrongList.length*100) + "%";
  document.getElementById("wrong-count").textContent = "错题回顾";

  const tag = document.getElementById("wrong-tag");
  if (q.type === "single") { tag.className = "q-tag single"; tag.textContent = q.cat; }
  else { tag.className = "q-tag judge"; tag.textContent = q.cat; }
  document.getElementById("wrong-stem").textContent = q.stem;

  const optBox = document.getElementById("wrong-options");
  optBox.innerHTML = "";
  let entries;
  if (q.type === "single") entries = ["A","B","C","D"].map(k => [k, q.options[k] || ""]);
  else entries = [["T","正确"],["F","错误"]];
  entries.forEach(([k, text]) => {
    const div = document.createElement("div");
    let cls = "option disabled";
    if (k === q.answer) cls += " correct";
    if (k === picked && k !== q.answer) cls += " wrong";
    div.className = cls;
    div.innerHTML = `<span class="opt-key">${q.type==="single"?k:(k==="T"?"√":"×")}</span><span class="opt-text"></span>`;
    div.querySelector(".opt-text").textContent = text;
    optBox.appendChild(div);
  });

  let ansText;
  if (q.type === "single") ansText = q.answer + "：" + (q.options[q.answer] || "");
  else ansText = q.answer === "T" ? "正确" : "错误";
  document.getElementById("wrong-feedback").innerHTML =
    `<span class="label">正确答案：${ansText}</span>` +
    (q.explanation ? `<div class="expl"><b>解析：</b>${q.explanation}</div>` : "");

  document.getElementById("wrong-prev").disabled = (wrongIdx === 0);
  document.getElementById("wrong-next").textContent =
    (wrongIdx === wrongList.length - 1) ? "完成" : "下一题";
}
function wrongNav(d) {
  const ni = wrongIdx + d;
  if (ni < 0) return;
  if (ni >= wrongList.length) { showResults(); return; }
  wrongIdx = ni;
  renderWrong();
}

// ---------- RESTART ----------
function restart() {
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "";
  renderStart();
}

// init
renderStart();
</script>
